services:
  postgres:
    image: postgres:16-alpine
    container_name: boran-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boran_ai
      POSTGRES_USER: boran
      POSTGRES_PASSWORD: boranpass
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boran -d boran_ai"]
      interval: 5s
      timeout: 5s
      retries: 15
